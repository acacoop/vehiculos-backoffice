name: Deploy Staging

on:
  push:
    branches:
      - test

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy to Staging
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@acacoop"

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run build
        env:
          VITE_ENTRA_CLIENT_ID: ${{ vars.ENTRA_CLIENT_ID }}
          VITE_ENTRA_TENANT_ID: ${{ vars.ENTRA_TENANT_ID }}
          VITE_API_SCOPE: ${{ vars.API_SCOPE }}
          VITE_BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL_TEST }}
          VITE_ENTRA_REDIRECT_URI: ${{ vars.ENTRA_REDIRECT_URI_TEST }}

      - name: Deploy to Azure
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_SEA_0EE0CEB0F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          skip_app_build: true
          app_location: "dist"
          api_location: ""
          output_location: ""
