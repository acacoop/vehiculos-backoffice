name: CI

on:
    pull_request:
        branches:
            - main
            - test

permissions:
    contents: read

jobs:
    lint-and-build:
        runs-on: ubuntu-latest
        name: Lint & Build
        steps:
            - uses: actions/checkout@v3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Type check & Build
              run: npm run build
