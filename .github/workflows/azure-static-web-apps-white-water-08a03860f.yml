name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy to Production
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          VITE_ENTRA_CLIENT_ID: ${{ vars.ENTRA_CLIENT_ID }}
          VITE_ENTRA_TENANT_ID: ${{ vars.ENTRA_TENANT_ID }}
          VITE_API_SCOPE: ${{ vars.API_SCOPE }}
          VITE_BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL_PROD }}
          VITE_ENTRA_REDIRECT_URI: ${{ vars.ENTRA_REDIRECT_URI_PROD }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_WATER_08A03860F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "dist"
